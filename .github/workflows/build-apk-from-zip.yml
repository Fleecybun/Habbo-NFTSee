name: Build APK from Zip

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
    paths:
      - "habbo-watchtower-androidide.zip"
      - ".github/workflows/build-apk-from-zip.yml"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Unzip project
        run: |
          rm -rf project
          unzip -q habbo-watchtower-androidide.zip -d project

          PROJECT_DIR="$(find project -maxdepth 4 -name settings.gradle -exec dirname {} \; | head -n 1)"

          if [ -z "$PROJECT_DIR" ]; then
            echo "Could not find settings.gradle after unzipping."
            echo "Zip contents:"
            find project -maxdepth 5 -type f | head -100
            exit 1
          fi

          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"
          echo "Found Android project at: $PROJECT_DIR"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "7.6.4"

      - name: Build debug APK
        run: |
          cd "$PROJECT_DIR"
          gradle :app:assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: habbo-watchtower-debug-apk
          path: ${{ env.PROJECT_DIR }}/app/build/outputs/apk/debug/*.apk
